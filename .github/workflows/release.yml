name: Build And Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: electron-overlay/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          py -3.10 -m pip install --upgrade pip
          py -3.10 -m pip install -r requirements.txt

      - name: Build with compile.bat
        shell: cmd
        run: compile.bat
        env:
          CI: "true"

      - name: Install Electron dependencies
        working-directory: electron-overlay
        shell: cmd
        run: npm.cmd ci

      - name: Build Electron standalone
        working-directory: electron-overlay
        shell: cmd
        run: npm.cmd run build:standalone

      - name: Build Electron portable
        working-directory: electron-overlay
        shell: cmd
        run: npm.cmd run build:onefile

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/overlay.exe
            electron-overlay/release/overlay-electron.exe
          generate_release_notes: true
