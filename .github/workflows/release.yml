name: Build And Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          py -3.10 -m pip install --upgrade pip
          py -3.10 -m pip install -r requirements.txt

      - name: Build with compile.bat
        shell: cmd
        run: compile.bat
        env:
          CI: "true"

      - name: Create or update release
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          $asset = "dist\overlay.exe"

          if (-not (Test-Path $asset)) {
            throw "Build output not found: $asset"
          }

          gh release view $env:TAG_NAME *> $null

          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:TAG_NAME $asset --clobber
          } else {
            gh release create $env:TAG_NAME $asset --generate-notes
          }
