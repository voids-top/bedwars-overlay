<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Void Overlay Electron</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main id="shell" class="shell">
      <header class="titlebar" aria-label="Window Controls">
        <div id="titleText" class="titlebar-title">Void Overlay</div>
        <div class="titlebar-group left-controls">
          <button id="settingsButton" class="icon-button mode-button" type="button" title="Settings" aria-label="Settings">
            <svg class="icon-stroke" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M2.5 4h11"/>
              <path d="M2.5 8h11"/>
              <path d="M2.5 12h11"/>
              <circle cx="6" cy="4" r="1.2" class="icon-dot"/>
              <circle cx="10" cy="8" r="1.2" class="icon-dot"/>
              <circle cx="7.5" cy="12" r="1.2" class="icon-dot"/>
            </svg>
          </button>
          <button id="aboutButton" class="icon-button mode-button" type="button" title="About" aria-label="About">
            <svg class="icon-stroke" viewBox="0 0 16 16" aria-hidden="true">
              <circle cx="8" cy="8" r="5.5"/>
              <path d="M8 7v4"/>
              <circle cx="8" cy="4.6" r=".6" class="icon-dot"/>
            </svg>
          </button>
          <button id="musicButton" class="icon-button mode-button" type="button" title="Music" aria-label="Music">
            <svg class="icon-fill music-icon" viewBox="0 0 16 16" aria-hidden="true">
              <path d="M12.2 1.3a.7.7 0 0 1 .8.7v8.3a2.8 2.8 0 1 1-1.6-2.5V4.5L6.6 5.7v5.6a2.8 2.8 0 1 1-1.6-2.5V3.4a.7.7 0 0 1 .5-.7Z"/>
            </svg>
          </button>
        </div>
        <div class="titlebar-group right-controls">
          <button id="minimizeButton" class="icon-button window-button" type="button" title="Minimize" aria-label="Minimize">
            <svg class="icon-stroke minimize-icon" viewBox="0 0 20 20" aria-hidden="true">
              <path d="M4.5 13h11"/>
            </svg>
          </button>
          <button id="closeButton" class="icon-button window-button close" type="button" title="Close" aria-label="Close">
            <svg class="icon-stroke close-icon" viewBox="0 0 20 20" aria-hidden="true">
              <path d="M5.5 5.5 14.5 14.5"/>
              <path d="M14.5 5.5 5.5 14.5"/>
            </svg>
          </button>
        </div>
      </header>
      <canvas id="overlayCanvas"></canvas>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
